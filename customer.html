<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>پروفایل مشتری | CRM مغازه</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-bar">
  <a href="dashboard.html" class="back">‹ بازگشت</a>
  <h1 id="custNameTitle">مشتری</h1>
  <span id="levelBadgeSlot"></span>
</div>

<div class="container">

  <div class="card" id="infoCard">
    <div class="loading">در حال بارگذاری...</div>
  </div>

  <div class="section-title">تاریخچه خرید</div>
  <div class="card" id="purchaseList"></div>

  <div class="section-title">وچرها</div>
  <div class="card" id="voucherList"></div>

</div>

<button class="fab" id="openPurchaseBtn">+</button>

<!-- Add purchase sheet -->
<div class="overlay" id="purchaseOverlay">
  <div class="sheet">
    <h2>ثبت خرید جدید</h2>
    <div id="purchaseError" class="error-msg"></div>
    <div id="purchaseSuccess" class="success-msg"></div>
    <form id="purchaseForm">
      <label>مبلغ خرید (درهم) *</label>
      <input type="number" id="p_amount" min="1" step="0.01" required>

      <label>شعبه *</label>
      <select id="p_branch" required></select>

      <label>تاریخ خرید</label>
      <input type="date" id="p_date">

      <button type="submit" class="btn">ثبت خرید</button>
      <button type="button" class="btn secondary" id="cancelPurchaseBtn" style="margin-top:10px;">انصراف</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module" src="customer.js"></script>
</body>
</html>
