<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Customer Profile | Shop CRM</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7A4E2A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Al Hudu">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-32.png" sizes="32x32" type="image/png">
</head>
<body>

<div class="watermark">Al Hudu</div>

<div class="app-bar">
  <a href="dashboard.html" class="back">‹ Back</a>
  <h1><span class="brand">Al Hudu</span><span class="page-name" id="custNameTitle">Customer</span></h1>
  <span id="levelBadgeSlot"></span>
</div>

<div class="container">

  <div class="card" id="infoCard">
    <div class="loading">Loading...</div>
  </div>

  <div class="section-title">Purchase History</div>
  <div class="card" id="purchaseList"></div>

  <div class="section-title">Vouchers</div>
  <div class="card" id="voucherList"></div>

</div>

<button class="fab" id="openPurchaseBtn">+</button>

<!-- Add purchase sheet -->
<div class="overlay" id="purchaseOverlay">
  <div class="sheet">
    <h2>Record New Purchase</h2>
    <div id="purchaseError" class="error-msg"></div>
    <div id="purchaseSuccess" class="success-msg"></div>
    <form id="purchaseForm">
      <label>Purchase Amount (AED) *</label>
      <input type="number" id="p_amount" min="1" step="0.01" required>

      <label>Branch *</label>
      <select id="p_branch" required></select>

      <label>Salesperson *</label>
      <select id="p_salesperson" required></select>

      <label>Purchase Date</label>
      <input type="date" id="p_date">

      <button type="submit" class="btn">Record Purchase</button>
      <button type="button" class="btn secondary" id="cancelPurchaseBtn" style="margin-top:10px;">Cancel</button>
    </form>
  </div>
</div>

<!-- Redeem points sheet -->
<div class="overlay" id="redeemOverlay">
  <div class="sheet">
    <h2>Redeem Points</h2>
    <div id="redeemError" class="error-msg"></div>
    <div id="redeemSuccess" class="success-msg"></div>
    <div id="redeemInfo" class="muted" style="margin-bottom:14px;"></div>
    <label>Points to Redeem *</label>
    <input type="number" id="r_points" min="10" step="10" placeholder="e.g. 500">
    <div id="redeemPreview" class="muted" style="margin-bottom:14px;"></div>
    <button class="btn" id="confirmRedeemBtn">Confirm Redemption</button>
    <button type="button" class="btn secondary" id="cancelRedeemBtn" style="margin-top:10px;">Cancel</button>
  </div>
</div>

<!-- Edit basic info sheet -->
<div class="overlay" id="editOverlay">
  <div class="sheet">
    <h2>Edit Customer Info</h2>
    <div id="editError" class="error-msg"></div>
    <div id="editSuccess" class="success-msg"></div>
    <form id="editForm">
      <label>Name *</label>
      <input type="text" id="e_name" required>

      <label>Phone Number</label>
      <input type="tel" id="e_phone" placeholder="+971...">

      <label>Email</label>
      <input type="email" id="e_email">

      <label>Birthday</label>
      <input type="date" id="e_birthday">

      <label>Address</label>
      <input type="text" id="e_address" placeholder="e.g. Villa 12, Al Wasl Road, Dubai" maxlength="200">

      <label>Emirate</label>
      <select id="e_emirate">
        <option value="">— Select —</option>
      </select>
      <input type="text" id="e_emirate_other" placeholder="Type emirate name" maxlength="60" style="display:none; margin-top:8px;">

      <label>Area</label>
      <select id="e_area">
        <option value="">— Select —</option>
      </select>
      <input type="text" id="e_area_other" placeholder="Type area name" maxlength="60" style="display:none; margin-top:8px;">

      <button type="submit" class="btn">Save Changes</button>
      <button type="button" class="btn secondary" id="cancelEditBtn" style="margin-top:10px;">Cancel</button>
    </form>
  </div>
</div>

<script type="module" src="auth-guard.js"></script>
<script type="module" src="customer.js"></script>
<script src="sw-register.js"></script>
</body>
</html>
