<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Customers | Shop CRM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="watermark">Al Hudu</div>

<div class="app-bar">
  <h1><span class="brand">Al Hudu</span><span class="page-name">Customers</span></h1>
  <div style="display:flex; gap:8px; align-items:center;">
    <span id="roleBadge"></span>
    <button id="hamburgerBtn" class="hamburger">☰</button>
  </div>
</div>

<div class="container">
  <div class="dash-stats" id="statsArea"></div>
  <div id="quickAccess"></div>

  <input type="text" id="searchInput" class="search-box" placeholder="Search by name or phone...">

  <div id="listArea">
    <div class="loading">Loading...</div>
  </div>
</div>

<button class="fab" id="openAddBtn">+</button>

<!-- Add customer sheet -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <h2>New Customer</h2>
    <div id="addError" class="error-msg"></div>
    <form id="addForm">
      <label>Customer Name *</label>
      <input type="text" id="c_name" required>

      <label>Phone Number</label>
      <input type="tel" id="c_phone" placeholder="+971...">

      <label>Email</label>
      <input type="email" id="c_email" placeholder="customer@email.com">

      <label>Birthday</label>
      <input type="date" id="c_birthday">

      <button type="submit" class="btn">Save Customer</button>
      <button type="button" class="btn secondary" id="cancelAddBtn" style="margin-top:10px;">Cancel</button>
    </form>
  </div>
</div>

<script type="module" src="auth-guard.js"></script>
<script type="module" src="nav-menu.js"></script>
<script type="module" src="dashboard.js"></script>
</body>
</html>
