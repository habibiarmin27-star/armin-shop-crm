<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sign In | Shop CRM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="center-screen">
  <div class="card login-card">
    <div class="logo">Shop CRM</div>
    <div class="sub">Staff Sign In</div>

    <div id="blockedBox" class="error-msg"></div>
    <div id="errorBox" class="error-msg"></div>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="example@shop.com" required autocomplete="username">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">

      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>
  </div>
</div>

<script type="module">
  import { auth } from "./firebase-init.js";
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = "dashboard.html";
  });

  if (new URLSearchParams(window.location.search).get("blocked") === "1") {
    const blockedBox = document.getElementById("blockedBox");
    blockedBox.textContent = "This account is not active. Please contact your admin.";
    blockedBox.classList.add("show");
  }

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("errorBox");
  const loginBtn = document.getElementById("loginBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.classList.remove("show");
    loginBtn.textContent = "Signing in...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "dashboard.html";
    } catch (err) {
      loginBtn.textContent = "Sign In";
      errorBox.textContent = "Incorrect email or password.";
      errorBox.classList.add("show");
    }
  });
</script>
</body>
</html>
