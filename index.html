<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ورود | CRM مغازه</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="center-screen">
  <div class="card login-card">
    <div class="logo">CRM مغازه</div>
    <div class="sub">ورود کارمندان</div>

    <div id="errorBox" class="error-msg"></div>

    <form id="loginForm">
      <label for="email">ایمیل</label>
      <input type="email" id="email" placeholder="example@shop.com" required autocomplete="username">

      <label for="password">رمز عبور</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">

      <button type="submit" class="btn" id="loginBtn">ورود</button>
    </form>
  </div>
</div>

<script type="module">
  import { auth } from "./firebase-init.js";
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // If already logged in, skip straight to the dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = "dashboard.html";
  });

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("errorBox");
  const loginBtn = document.getElementById("loginBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.classList.remove("show");
    loginBtn.textContent = "در حال ورود...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "dashboard.html";
    } catch (err) {
      loginBtn.textContent = "ورود";
      errorBox.textContent = "ایمیل یا رمز عبور اشتباه است.";
      errorBox.classList.add("show");
    }
  });
</script>
</body>
</html>
