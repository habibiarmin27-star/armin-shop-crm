<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Manager Reports | Shop CRM</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
.trend-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
.trend-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px;
  position:relative; overflow:hidden;
}
.trend-card::before{
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--accent);
}
.trend-card.green::before{ background:var(--up); }
.trend-card.purple::before{ background:var(--vip); }
.trend-card .lbl{ font-size:10.5px; color:var(--text-dim); font-weight:700; margin-bottom:8px; }
.trend-card .num{ font-size:20px; font-weight:800; color:var(--accent); }
.trend-card .trend-line{
  font-size:11px; font-weight:700; margin-top:6px;
  display:flex; align-items:center; gap:4px;
}
.trend-line.up{ color:var(--up); }
.trend-line.down{ color:var(--down); }
.trend-line.neutral{ color:var(--text-dim); }

.chart-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px; margin-bottom:14px;
}
.chart-title{ font-size:13px; font-weight:800; margin-bottom:3px; }
.chart-sub{ font-size:11px; color:var(--text-dim); margin-bottom:14px; }
.chart-wrap{ position:relative; height:200px; }

.duo-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.mini-chart-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px;
}
.mini-chart-card .chart-title{ font-size:12px; margin-bottom:12px; }
.mini-wrap{ position:relative; height:130px; }
.legend{ margin-top:10px; display:flex; flex-direction:column; gap:5px; }
.legend-item{ display:flex; align-items:center; gap:7px; font-size:10.5px; color:var(--text-dim); }
.legend-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }

.top-table{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.top-table .t-head{
  display:grid; grid-template-columns:1.6fr .7fr .7fr .7fr;
  padding:10px 14px; font-size:10px; font-weight:800;
  color:var(--text-dim); border-bottom:1px solid var(--border);
  background:var(--surface-2);
}
.top-table .t-row{
  display:grid; grid-template-columns:1.6fr .7fr .7fr .7fr;
  padding:11px 14px; font-size:12px; border-bottom:1px solid var(--border);
  align-items:center;
}
.top-table .t-row:last-child{ border-bottom:none; }
.t-row .t-name{ font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.t-row .t-amt{ font-weight:800; color:var(--accent); }

/* Filter tabs */
.filter-bar{
  display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;
}
.filter-tab{
  padding:7px 14px; border-radius:20px; font-size:12px; font-weight:700;
  background:var(--surface); color:var(--text-dim); border:1px solid var(--border);
  cursor:pointer; font-family:inherit; transition:all .15s;
}
.filter-tab.active{
  background:var(--accent); color:var(--accent-text); border-color:var(--accent);
}

/* Time toggle */
.time-toggle{
  display:flex; background:var(--surface-2); border-radius:8px;
  padding:3px; gap:3px; margin-bottom:14px; border:1px solid var(--border);
}
.time-btn{
  flex:1; padding:7px; border-radius:6px; font-size:12px; font-weight:700;
  background:none; color:var(--text-dim); border:none; cursor:pointer;
  font-family:inherit; transition:all .15s;
}
.time-btn.active{
  background:var(--surface); color:var(--accent);
  box-shadow:0 1px 4px rgba(57,43,31,.12);
}
</style>
</head>
<body>

<div class="app-bar">
  <a href="dashboard.html" class="back">‹ Back</a>
  <h1>Manager Reports</h1>
  <span></span>
</div>

<div class="container" id="reportArea">
  <div class="loading">Loading...</div>
</div>

<script type="module" src="auth-guard.js"></script>
<script type="module" src="reports.js"></script>
</body>
</html>
