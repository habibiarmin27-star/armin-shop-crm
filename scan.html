<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Scan Voucher | Shop CRM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-bar">
  <a href="dashboard.html" class="back">‹ Back</a>
  <h1>Scan Voucher</h1>
  <span></span>
</div>

<div class="container">
  <div class="card">
    <label>Scan or enter the voucher code</label>
    <input type="text" id="codeInput" placeholder="VC..." autofocus>
    <button class="btn" id="checkBtn">Check Code</button>
    <p class="muted" style="margin-top:10px;">
      If you have a USB/Bluetooth barcode scanner, just tap this field and scan — it will type itself in.
    </p>
  </div>

  <div id="resultArea"></div>
</div>

<script type="module" src="auth-guard.js"></script>
<script type="module" src="scan.js"></script>
</body>
</html>
