<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Scan Voucher | Shop CRM</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7A4E2A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Al Hudu">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-32.png" sizes="32x32" type="image/png">
</head>
<body>

<div class="watermark">Al Hudu</div>

<div class="app-bar">
  <a href="dashboard.html" class="back">‹ Back</a>
  <h1><span class="brand">Al Hudu</span><span class="page-name">Scan Voucher</span></h1>
  <span></span>
</div>

<div class="container">
  <div class="card">
    <label>Scan or enter the voucher code</label>
    <input type="text" id="codeInput" placeholder="VC..." autofocus>
    <button class="btn" id="checkBtn">Check Code</button>
    <p class="muted" style="margin-top:10px;">
      If you have a USB/Bluetooth barcode scanner, just tap this field and scan — it will type itself in.
    </p>
  </div>

  <div id="resultArea"></div>
</div>

<script type="module" src="auth-guard.js"></script>
<script type="module" src="scan.js"></script>
<script src="sw-register.js"></script>
</body>
</html>
