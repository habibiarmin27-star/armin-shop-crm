<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Staff Profile | Shop CRM</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
.profile-head{ display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.profile-avatar{
  width:52px; height:52px; border-radius:50%; background:var(--accent-soft);
  color:var(--accent); display:flex; align-items:center; justify-content:center;
  font-size:19px; font-weight:800; flex-shrink:0;
}
.profile-name{ font-size:17px; font-weight:800; }
.profile-meta{ font-size:12px; color:var(--text-dim); margin-top:2px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.rank-pill{ font-size:10.5px; font-weight:800; padding:3px 10px; border-radius:20px; white-space:nowrap; }
.rank-1{ background:rgba(156,122,48,.15); color:var(--gold); }
.rank-2{ background:rgba(126,118,96,.15); color:var(--silver); }
.rank-3{ background:rgba(201,130,82,.15); color:#C08552; }
.rank-other{ background:var(--surface-2); color:var(--text-dim); }
.role-pill{ font-size:10px; padding:3px 8px; border-radius:6px; font-weight:800; }
.role-pill.admin{ background:rgba(140,94,150,.14); color:var(--vip); }
.role-pill.staff{ background:var(--surface-2); color:var(--text-dim); }

.chart-title{ font-size:13px; font-weight:800; margin-bottom:3px; }
.chart-sub{ font-size:11px; color:var(--text-dim); margin-bottom:14px; }
.chart-wrap{ position:relative; height:200px; }
.chart-card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px; margin-bottom:14px;
}

.filter-row{ display:flex; gap:8px; align-items:center; margin-bottom:12px; }
.filter-row input[type=date]{
  flex:1; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
  border-radius:var(--radius-sm); padding:10px 12px; font-size:13px; font-family:inherit; margin:0;
}
.filter-row button{
  font-family:inherit; cursor:pointer; border:1px solid var(--border); background:var(--surface);
  color:var(--text-dim); border-radius:var(--radius-sm); padding:10px 13px; font-size:12px; font-weight:700;
}

.top-table{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.top-table .t-head{
  display:grid; grid-template-columns:.8fr 1.3fr .8fr .8fr; padding:10px 14px; font-size:10px;
  font-weight:800; color:var(--text-dim); border-bottom:1px solid var(--border); background:var(--surface-2);
}
.top-table .t-row{
  display:grid; grid-template-columns:.8fr 1.3fr .8fr .8fr; padding:11px 14px; font-size:12px;
  border-bottom:1px solid var(--border); align-items:center;
}
.top-table .t-row:last-child{ border-bottom:none; }
.t-row .t-date{ font-size:11px; color:var(--text-dim); }
.t-row .t-name{ font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.t-row .t-branch{ font-size:10.5px; color:var(--text-dim); }
.t-row .t-amt{ font-weight:800; color:var(--accent); text-align:right; }
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7A4E2A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Al Hudu">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-32.png" sizes="32x32" type="image/png">
</head>
<body>

<div class="watermark">Al Hudu</div>

<div class="app-bar">
  <a href="staff.html" class="back">‹ Back</a>
  <h1><span class="brand">Al Hudu</span><span class="page-name">Staff Profile</span></h1>
  <span></span>
</div>

<div class="container" id="profileArea">
  <div class="loading">Loading...</div>
</div>

<script type="module" src="auth-guard.js"></script>
<script type="module" src="staff-profile.js"></script>
<script src="sw-register.js"></script>
</body>
</html>
